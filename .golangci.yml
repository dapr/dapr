version: "2"

run:
  concurrency: 4
  timeout: 15m
  issues-exit-code: 1
  tests: true
  build-tags:
    - unit
    - allcomponents
    - subtlecrypto

issues:
  exclude-dirs:
    - ^pkg.*client.*clientset.*versioned.*
    - ^pkg.*client.*informers.*externalversions.*
    - ^pkg.*proto.*
    - pkg/proto

output:
  formats:
    tab:
      print-issued-lines: true
      print-linter-name: true

linters:
  default: all

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt:.*
        - io/ioutil:^Read.*

    funlen:
      lines: 60
      statements: 40

    govet:
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
      enable:
        - atomicalign
      enable-all: false
      disable-all: false

    revive:
      confidence: 0.8

    gocyclo:
      min-complexity: 10

    gocognit:
      min-complexity: 10

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 5

    depguard:
      rules:
        master:
          list-mode: lax
          deny:
            - pkg: "github.com/Sirupsen/logrus"
              desc: "must use github.com/dapr/kit/logger"
            - pkg: "github.com/agrea/ptr"
              desc: "must use github.com/dapr/kit/ptr"
            - pkg: "go.uber.org/atomic"
              desc: "must use sync/atomic"
            - pkg: "golang.org/x/net/context"
              desc: "must use context"
            - pkg: "github.com/pkg/errors"
              desc: "must use standard library (errors package and/or fmt.Errorf)"
            - pkg: "github.com/go-chi/chi$"
              desc: "must use github.com/go-chi/chi/v5"
            - pkg: "github.com/cenkalti/backoff$"
              desc: "must use github.com/cenkalti/backoff/v4"
            - pkg: "github.com/cenkalti/backoff/v2"
              desc: "must use github.com/cenkalti/backoff/v4"
            - pkg: "github.com/cenkalti/backoff/v3"
              desc: "must use github.com/cenkalti/backoff/v4"
            - pkg: "github.com/benbjohnson/clock"
              desc: "must use k8s.io/utils/clock"
            - pkg: "github.com/ghodss/yaml"
              desc: "must use sigs.k8s.io/yaml"
            - pkg: "gopkg.in/yaml.v2"
              desc: "must use gopkg.in/yaml.v3"
            - pkg: "github.com/golang-jwt/jwt"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/golang-jwt/jwt/v2"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/golang-jwt/jwt/v3"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/golang-jwt/jwt/v4"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/gogo/status"
              desc: "must use google.golang.org/grpc/status"
            - pkg: "github.com/gogo/protobuf"
              desc: "must use google.golang.org/protobuf"
            - pkg: "github.com/lestrrat-go/jwx/jwa"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/lestrrat-go/jwx/jwt"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/labstack/gommon/log"
              desc: "must use github.com/dapr/kit/logger"
            - pkg: "github.com/gobuffalo/logger"
              desc: "must use github.com/dapr/kit/logger"
            - pkg: "k8s.io/utils/pointer"
              desc: "must use github.com/dapr/kit/ptr"
            - pkg: "k8s.io/utils/ptr"
              desc: "must use github.com/dapr/kit/ptr"

    misspell:
      ignore-words:
        - someword

    lll:
      line-length: 120
      tab-width: 1

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      disabled-checks:
        - regexpMust
        - rangeValCopy
        - hugeParam
        - ifElseChain
        - singleCaseSwitch
        - exitAfterDefer
        - elseif
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true

    staticcheck:
      # S1xxx = gosimple (was a separate disabled linter in v1)
      # QFxxx = quickfix checks (new in v2, didn't exist in v1)
      # ST1xxx = stylecheck (merged into staticcheck in v2; //nolint:stylecheck directives
      #          are now unknown so suppression no longer works — disable for the upgrade)
      checks:
        - "all"
        - "-S1*"
        - "-QF*"
        - "-ST1*"

    dogsled:
      max-blank-identifiers: 2

    whitespace:
      multi-if: false
      multi-func: false

    wsl:
      strict-append: true
      allow-assign-and-call: true
      allow-multiline-assign: true
      allow-cuddle-declarations: false
      force-case-trailing-whitespace: 1

  disable:
    # TODO Enforce the below linters later
    - musttag
    - dupl
    - errcheck
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocyclo
    - gocognit
    - godox
    - lll
    - unparam
    - wsl
    - testpackage
    - nestif
    - nlreturn
    - exhaustive
    - exhaustruct
    - noctx
    - tparallel
    - paralleltest
    - wrapcheck
    - tagliatelle
    - ireturn
    - errchkjson
    - contextcheck
    - gomoddirectives
    - godot
    - cyclop
    - varnamelen
    - errorlint
    - forcetypeassert
    - maintidx
    - nilnil
    - predeclared
    - thelper
    - wastedassign
    - containedctx
    - nonamedreturns
    - asasalint
    - rowserrcheck
    - sqlclosecheck
    - inamedparam
    - mnd
    - canonicalheader
    - err113
    - fatcontext
    # v2: new linters not yet enforced
    - embeddedstructfieldcheck
    - funcorder
    - tagalign
    - usetesting
    - gosec
    - noinlineerr
    - protogetter
    - testifylint
    - wsl_v5
    - nolintlint
