version: "2"

# options for analysis running
run:
  # default concurrency is a available CPU number
  concurrency: 4

  # timeout for analysis, e.g. 30s, 5m, default is 1m
  timeout: 15m

  # exit code when at least one issue was found, default is 1
  issues-exit-code: 1

  # include test files or not, default is true
  tests: true

  # list of build tags, all linters use it. Default is empty list.
  build-tags:
    - unit
    - allcomponents
    - subtlecrypto

issues:
  # which dirs to skip: they won't be analyzed;
  # can use regexp here: generated.*, regexp is applied on full path;
  # default value is empty list, but next dirs are always skipped independently
  # from this option's value:
  # third_party$, testdata$, examples$, Godeps$, builtin$
  exclude-dirs:
    - ^pkg.*client.*clientset.*versioned.*
    - ^pkg.*client.*informers.*externalversions.*
    - ^pkg.*proto.*
    - pkg/proto

  exclude-rules:
    # gosimple was a separate linter in v1 (disabled); in v2 its checks (S1xxx)
    # and quickfix checks (QFxxx) are part of staticcheck — keep them suppressed.
    - linters: [staticcheck]
      text: "^S1[0-9]"
    - linters: [staticcheck]
      text: "^QF[0-9]"

# output configuration options
output:
  formats:
    tab:
      print-issued-lines: true
      print-linter-name: true

linters:
  default: all

  # In golangci-lint v2, linter settings are nested under linters.settings
  # (previously the top-level linters-settings key).
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt:.*
        - io/ioutil:^Read.*

    funlen:
      lines: 60
      statements: 40

    govet:
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
      enable:
        - atomicalign
        - shadow
      enable-all: false
      disable-all: false

    revive:
      confidence: 0.8

    gocyclo:
      min-complexity: 10

    gocognit:
      min-complexity: 10

    dupl:
      threshold: 100

    goconst:
      min-len: 3
      min-occurrences: 5

    depguard:
      rules:
        master:
          list-mode: lax
          deny:
            - pkg: "github.com/Sirupsen/logrus"
              desc: "must use github.com/dapr/kit/logger"
            - pkg: "github.com/agrea/ptr"
              desc: "must use github.com/dapr/kit/ptr"
            - pkg: "go.uber.org/atomic"
              desc: "must use sync/atomic"
            - pkg: "golang.org/x/net/context"
              desc: "must use context"
            - pkg: "github.com/pkg/errors"
              desc: "must use standard library (errors package and/or fmt.Errorf)"
            - pkg: "github.com/go-chi/chi$"
              desc: "must use github.com/go-chi/chi/v5"
            - pkg: "github.com/cenkalti/backoff$"
              desc: "must use github.com/cenkalti/backoff/v4"
            - pkg: "github.com/cenkalti/backoff/v2"
              desc: "must use github.com/cenkalti/backoff/v4"
            - pkg: "github.com/cenkalti/backoff/v3"
              desc: "must use github.com/cenkalti/backoff/v4"
            - pkg: "github.com/benbjohnson/clock"
              desc: "must use k8s.io/utils/clock"
            - pkg: "github.com/ghodss/yaml"
              desc: "must use sigs.k8s.io/yaml"
            - pkg: "gopkg.in/yaml.v2"
              desc: "must use gopkg.in/yaml.v3"
            - pkg: "github.com/golang-jwt/jwt"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/golang-jwt/jwt/v2"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/golang-jwt/jwt/v3"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/golang-jwt/jwt/v4"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            # pkg: Commonly auto-completed by gopls
            - pkg: "github.com/gogo/status"
              desc: "must use google.golang.org/grpc/status"
            - pkg: "github.com/gogo/protobuf"
              desc: "must use google.golang.org/protobuf"
            - pkg: "github.com/lestrrat-go/jwx/jwa"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/lestrrat-go/jwx/jwt"
              desc: "must use github.com/lestrrat-go/jwx/v2"
            - pkg: "github.com/labstack/gommon/log"
              desc: "must use github.com/dapr/kit/logger"
            - pkg: "github.com/gobuffalo/logger"
              desc: "must use github.com/dapr/kit/logger"
            - pkg: "k8s.io/utils/pointer"
              desc: "must use github.com/dapr/kit/ptr"
            - pkg: "k8s.io/utils/ptr"
              desc: "must use github.com/dapr/kit/ptr"

    misspell:
      ignore-words:
        - someword

    lll:
      line-length: 120
      tab-width: 1

    nakedret:
      max-func-lines: 30

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    gocritic:
      disabled-checks:
        - regexpMust
        - rangeValCopy
        - hugeParam
        - ifElseChain
        - singleCaseSwitch
        - exitAfterDefer
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true

    godox:
      keywords:
        - NOTE
        - OPTIMIZE
        - HACK

    godot:
      exclude:
        - 'nosec'
      capital: false
      scope: all

    dogsled:
      max-blank-identifiers: 2

    whitespace:
      multi-if: false
      multi-func: false

    wsl:
      strict-append: true
      allow-assign-and-call: true
      allow-multiline-assign: true
      allow-cuddle-declarations: false
      force-case-trailing-whitespace: 1

  disable:
    # TODO Enforce the below linters later
    - musttag
    - dupl
    - errcheck
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocyclo
    - gocognit
    - godox
    - lll
    - unparam
    - wsl
    - testpackage
    - nestif
    - nlreturn
    - exhaustive
    - exhaustruct
    - noctx
    - tparallel
    - paralleltest
    - wrapcheck
    - tagliatelle
    - ireturn
    - errchkjson
    - contextcheck
    - gomoddirectives
    - godot
    - cyclop
    - varnamelen
    - errorlint
    - forcetypeassert
    - maintidx
    - nilnil
    - predeclared
    - thelper
    - wastedassign
    - containedctx
    - nonamedreturns
    - asasalint
    - rowserrcheck
    - sqlclosecheck
    - inamedparam
    - mnd
    - canonicalheader
    - err113
    - fatcontext
    # v2 new linters not yet enforced
    - embeddedstructfieldcheck
    - funcorder
    - tagalign
    - usetesting
    - gosec
