---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workflowaccesspolicies.dapr.io
  labels:
    app.kubernetes.io/part-of: "dapr"
spec:
  group: dapr.io
  names:
    kind: WorkflowAccessPolicy
    listKind: WorkflowAccessPolicyList
    plural: workflowaccesspolicies
    singular: workflowaccesspolicy
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          WorkflowAccessPolicy controls which app IDs are permitted to schedule
          specific workflows and activities on a target application.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          scopes:
            items:
              type: string
            type: array
          spec:
            description: WorkflowAccessPolicySpec defines the desired state of WorkflowAccessPolicy.
            properties:
              rules:
                description: Rules defines the allow-list of which callers can perform
                  which operations.
                items:
                  description: |-
                    WorkflowAccessPolicyRule grants the listed callers access to the listed
                    workflows and/or activities. Presence of a matching rule grants access; if
                    no rule matches, the call is denied. At least one of workflows or
                    activities must be set.
                  properties:
                    activities:
                      description: Activities are the activity rules that the matched
                        callers are allowed.
                      items:
                        description: |-
                          ActivityRule grants the matched callers access to schedule the activity
                          whose name matches Name (exact or glob). Activities only have one
                          operation (schedule).
                        properties:
                          name:
                            description: Name is the exact name or glob pattern for
                              the activity.
                            maxLength: 256
                            minLength: 1
                            type: string
                          requires:
                            description: |-
                              Requires is an ordered list of history events that must all be present in
                              the caller's propagated workflow history for this rule to apply. The
                              entries must be satisfied in the order they are listed: each successive
                              entry matches an event at or after the event matched by the previous one.
                            items:
                              description: |-
                                RequiredEvent is a single entry in a rule's Requires list. It matches when
                                the caller's propagated history contains an event of the given EventType,
                                produced by AppID, with the given Name.
                              properties:
                                appID:
                                  description: |-
                                    AppID is the app ID that must have produced the matched event. An event
                                    only matches when it came from this app's propagated history.
                                  maxLength: 256
                                  minLength: 1
                                  type: string
                                eventType:
                                  description: EventType is the history event that
                                    must be present.
                                  enum:
                                  - activity.started
                                  - activity.completed
                                  - workflow.started
                                  - workflow.completed
                                  - event.raised
                                  type: string
                                name:
                                  description: |-
                                    Name is the activity name (activity.started|activity.completed), the
                                    child-workflow name (workflow.started|workflow.completed), or the
                                    external event name (event.raised).
                                  maxLength: 256
                                  minLength: 1
                                  type: string
                              required:
                              - appID
                              - eventType
                              - name
                              type: object
                            maxItems: 20
                            type: array
                        required:
                        - name
                        type: object
                      maxItems: 100
                      type: array
                    callers:
                      description: |-
                        Callers that this rule applies to. The policy is a cross-app gate;
                        listing the target app's own appID here has no effect because
                        same-app calls are always exempt from enforcement.
                      items:
                        description: WorkflowCaller identifies a calling application.
                        properties:
                          appID:
                            description: AppID is the Dapr app ID of the caller.
                            maxLength: 256
                            minLength: 1
                            type: string
                        required:
                        - appID
                        type: object
                      maxItems: 100
                      minItems: 1
                      type: array
                    workflows:
                      description: Workflows are the workflow rules that the matched
                        callers are allowed.
                      items:
                        description: |-
                          WorkflowRule grants the matched callers access to the listed operations on
                          workflows whose name matches Name (exact or glob). An optional `requires`
                          gate may be attached, but only when the rule's sole operation is
                          `schedule` — schedule is the only operation that carries propagated
                          workflow history to check against. Express OR across prerequisite sets by
                          listing multiple workflow rules with the same Name, each with its own
                          `requires`; access is granted if any matching rule is satisfied.
                        properties:
                          name:
                            description: Name is the exact name or glob pattern for
                              the workflow.
                            maxLength: 256
                            minLength: 1
                            type: string
                          operations:
                            description: Operations is the set of operations this
                              rule applies to.
                            items:
                              description: WorkflowOperation is the specific workflow
                                operation being controlled.
                              enum:
                              - schedule
                              - terminate
                              - raise
                              - pause
                              - resume
                              - purge
                              - get
                              - rerun
                              type: string
                            maxItems: 8
                            minItems: 1
                            type: array
                            x-kubernetes-list-type: set
                          requires:
                            description: |-
                              Requires is an ordered list of history events that must all be present in
                              the caller's propagated workflow history for this rule to apply. The
                              entries must be satisfied in the order they are listed: each successive
                              entry matches an event at or after the event matched by the previous one.
                              Only valid when the rule's only operation is `schedule`.
                            items:
                              description: |-
                                RequiredEvent is a single entry in a rule's Requires list. It matches when
                                the caller's propagated history contains an event of the given EventType,
                                produced by AppID, with the given Name.
                              properties:
                                appID:
                                  description: |-
                                    AppID is the app ID that must have produced the matched event. An event
                                    only matches when it came from this app's propagated history.
                                  maxLength: 256
                                  minLength: 1
                                  type: string
                                eventType:
                                  description: EventType is the history event that
                                    must be present.
                                  enum:
                                  - activity.started
                                  - activity.completed
                                  - workflow.started
                                  - workflow.completed
                                  - event.raised
                                  type: string
                                name:
                                  description: |-
                                    Name is the activity name (activity.started|activity.completed), the
                                    child-workflow name (workflow.started|workflow.completed), or the
                                    external event name (event.raised).
                                  maxLength: 256
                                  minLength: 1
                                  type: string
                              required:
                              - appID
                              - eventType
                              - name
                              type: object
                            maxItems: 20
                            type: array
                        required:
                        - name
                        - operations
                        type: object
                        x-kubernetes-validations:
                        - message: requires is only valid when the rule's only operation
                            is 'schedule'
                          rule: '!has(self.requires) || size(self.requires) == 0 ||
                            (size(self.operations) == 1 && self.operations[0] == ''schedule'')'
                      maxItems: 100
                      type: array
                  required:
                  - callers
                  type: object
                  x-kubernetes-validations:
                  - message: at least one of workflows or activities must contain
                      a rule
                    rule: (has(self.workflows) && size(self.workflows) > 0) || (has(self.activities)
                      && size(self.activities) > 0)
                maxItems: 100
                type: array
            type: object
        type: object
    served: true
    storage: true
