---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workflowaccesspolicies.dapr.io
  labels:
    app.kubernetes.io/part-of: "dapr"
spec:
  group: dapr.io
  names:
    kind: WorkflowAccessPolicy
    listKind: WorkflowAccessPolicyList
    plural: workflowaccesspolicies
    singular: workflowaccesspolicy
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          WorkflowAccessPolicy controls which app IDs are permitted to schedule
          specific workflows and activities on a target application.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          scopes:
            items:
              type: string
            type: array
          spec:
            description: WorkflowAccessPolicySpec defines the desired state of WorkflowAccessPolicy.
            properties:
              defaultAction:
                default: deny
                description: DefaultAction is the action when no rule matches. Defaults
                  to "deny" if omitted.
                enum:
                - allow
                - deny
                type: string
              rules:
                description: Rules defines ingress rules for which callers can perform
                  which operations.
                items:
                  description: |-
                    WorkflowAccessPolicyRule defines a set of callers and the operations they
                    are allowed or denied.
                  properties:
                    callers:
                      description: Callers that this rule applies to.
                      items:
                        description: WorkflowCaller identifies a calling application.
                        properties:
                          appID:
                            description: AppID is the Dapr app ID of the caller.
                            minLength: 1
                            type: string
                        required:
                        - appID
                        type: object
                      minItems: 1
                      type: array
                    operations:
                      description: Operations that the matched callers are allowed/denied
                        to perform.
                      items:
                        description: WorkflowOperationRule defines access control
                          for a specific workflow or activity operation.
                        properties:
                          action:
                            description: Action is "allow" or "deny".
                            enum:
                            - allow
                            - deny
                            type: string
                          name:
                            description: Name is the exact name or glob pattern for
                              the workflow/activity.
                            minLength: 1
                            type: string
                          operation:
                            description: Operation defaults to "schedule" if omitted.
                            enum:
                            - schedule
                            type: string
                          requires:
                            description: |-
                              Requires is a list of history events that must all be present in
                              the caller's propagated workflow history for this rule to apply.
                              Nothing is required if empty.
                            items:
                              description: |-
                                RequiredEvent describes a history event that must be present in
                                the caller's propagated workflow history before the enclosing
                                operation rule applies. The event category is inferred from
                                which *Name field is set, exactly one must be set.
                              x-kubernetes-validations:
                              - rule: "(has(self.activityName) ? 1 : 0) + (has(self.workflowName) ? 1 : 0) + (has(self.eventName) ? 1 : 0) == 1"
                                message: "exactly one of activityName, workflowName, or eventName must be set"
                              properties:
                                activityName:
                                  description: |-
                                    ActivityName, when set, restricts the match to events
                                    produced by the named activity.
                                  type: string
                                appID:
                                  description: |-
                                    AppID, when set, requires the matched event to have been
                                    produced by the named app.
                                  type: string
                                eventName:
                                  description: |-
                                    EventName, when set, restricts the match to an external
                                    event with the given name. Only valid with status=Raised.
                                  type: string
                                status:
                                  description: |-
                                    Status is the lifecycle phase that the matched history event
                                    must have. Started, Completed and Failed apply uniformly to
                                    activities, child workflows and the workflow's own execution
                                    (resolved by which *Name field is set). Raised is reserved
                                    for external events.
                                  enum:
                                  - Started
                                  - Completed
                                  - Failed
                                  - Raised
                                  type: string
                                workflowName:
                                  description: |-
                                    WorkflowName, when set, restricts the match to a workflow or
                                    child-workflow event produced by the named workflow.
                                  type: string
                              required:
                              - status
                              type: object
                            type: array
                          type:
                            description: Type is "workflow" or "activity".
                            enum:
                            - workflow
                            - activity
                            type: string
                        required:
                        - action
                        - name
                        - type
                        type: object
                      minItems: 1
                      type: array
                  required:
                  - callers
                  - operations
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
