---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: workflowaccesspolicies.dapr.io
  labels:
    app.kubernetes.io/part-of: "dapr"
spec:
  group: dapr.io
  names:
    kind: WorkflowAccessPolicy
    listKind: WorkflowAccessPolicyList
    plural: workflowaccesspolicies
    singular: workflowaccesspolicy
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          WorkflowAccessPolicy controls which app IDs are permitted to schedule
          specific workflows and activities on a target application.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          scopes:
            items:
              type: string
            type: array
          spec:
            description: WorkflowAccessPolicySpec defines the desired state of WorkflowAccessPolicy.
            properties:
              rules:
                description: Rules defines the allow-list of which callers can perform
                  which operations.
                items:
                  description: |-
                    WorkflowAccessPolicyRule grants the listed callers access to the listed
                    workflows and/or activities. Presence of a matching rule grants access; if
                    no rule matches, the call is denied. At least one of workflows or
                    activities must be set.
                  properties:
                    activities:
                      description: Activities are the activity rules that the matched
                        callers are allowed.
                      items:
                        description: |-
                          ActivityRule grants the matched callers access to schedule the activity
                          whose name matches Name (exact or glob). Activities only have one
                          operation (schedule).
                        properties:
                          name:
                            description: Name is the exact name or glob pattern for
                              the activity.
                            minLength: 1
                            type: string
                          requires:
                            description: |-
                              Requires is a list of history events that must all be present in the
                              caller's propagated workflow history for this rule to apply. Entries
                              are evaluated as a set — order is not significant.
                            items:
                              description: |-
                                RequiredEvent describes a history event that must be present in
                                the caller's propagated workflow history. eventType=event must be
                                paired with status=Raised; eventType=activity|workflow forbids
                                status=Raised.
                              x-kubernetes-validations:
                              - rule: "self.eventType == 'event' ? self.status == 'Raised' : self.status != 'Raised'"
                                message: "eventType=event requires status=Raised; eventType=activity|workflow forbids status=Raised"
                              properties:
                                appID:
                                  description: AppID restricts the match to events produced by the named app.
                                  type: string
                                eventType:
                                  description: EventType is the category of history event to match.
                                  enum:
                                  - activity
                                  - workflow
                                  - event
                                  type: string
                                name:
                                  description: |-
                                    Name is the activity/workflow name (eventType=activity|workflow)
                                    or the external event name (eventType=event).
                                  minLength: 1
                                  type: string
                                status:
                                  description: Status is the lifecycle phase the matched event must have.
                                  enum:
                                  - Started
                                  - Completed
                                  - Raised
                                  type: string
                              required:
                              - eventType
                              - name
                              - status
                              type: object
                            type: array
                        required:
                        - name
                        type: object
                      type: array
                    callers:
                      description: Callers that this rule applies to.
                      items:
                        description: WorkflowCaller identifies a calling application.
                        properties:
                          appID:
                            description: AppID is the Dapr app ID of the caller.
                            minLength: 1
                            type: string
                        required:
                        - appID
                        type: object
                      minItems: 1
                      type: array
                    workflows:
                      description: Workflows are the workflow rules that the matched
                        callers are allowed.
                      items:
                        description: |-
                          WorkflowRule grants the matched callers access to the listed operations on
                          workflows whose name matches Name (exact or glob).
                        properties:
                          name:
                            description: Name is the exact name or glob pattern for
                              the workflow.
                            minLength: 1
                            type: string
                          operations:
                            description: Operations is the set of operations this
                              rule applies to.
                            items:
                              description: WorkflowOperation is the specific workflow
                                operation being controlled.
                              enum:
                              - schedule
                              - terminate
                              - raise
                              - pause
                              - resume
                              - purge
                              - get
                              - rerun
                              type: string
                            minItems: 1
                            type: array
                            x-kubernetes-list-type: set
                          requires:
                            description: |-
                              Requires is a list of history events that must all be present in the
                              caller's propagated workflow history for this rule to apply. Entries
                              are evaluated as a set — order is not significant. Only meaningful
                              for operations that carry propagated history (currently `schedule`);
                              rules whose `requires` cover other operations will fail-closed
                              because no history is available to satisfy them.
                            items:
                              description: |-
                                RequiredEvent describes a history event that must be present in
                                the caller's propagated workflow history. eventType=event must be
                                paired with status=Raised; eventType=activity|workflow forbids
                                status=Raised.
                              x-kubernetes-validations:
                              - rule: "self.eventType == 'event' ? self.status == 'Raised' : self.status != 'Raised'"
                                message: "eventType=event requires status=Raised; eventType=activity|workflow forbids status=Raised"
                              properties:
                                appID:
                                  description: AppID restricts the match to events produced by the named app.
                                  type: string
                                eventType:
                                  description: EventType is the category of history event to match.
                                  enum:
                                  - activity
                                  - workflow
                                  - event
                                  type: string
                                name:
                                  description: |-
                                    Name is the activity/workflow name (eventType=activity|workflow)
                                    or the external event name (eventType=event).
                                  minLength: 1
                                  type: string
                                status:
                                  description: Status is the lifecycle phase the matched event must have.
                                  enum:
                                  - Started
                                  - Completed
                                  - Raised
                                  type: string
                              required:
                              - eventType
                              - name
                              - status
                              type: object
                            type: array
                        required:
                        - name
                        - operations
                        type: object
                      type: array
                  required:
                  - callers
                  type: object
                  x-kubernetes-validations:
                  - message: at least one of workflows or activities must contain
                      a rule
                    rule: (has(self.workflows) && size(self.workflows) > 0) || (has(self.activities)
                      && size(self.activities) > 0)
                type: array
            type: object
        type: object
    served: true
    storage: true
