logLevel: info
component: placement

# Override this to use a custom placement service image.
# If the image name contains a "/", it is assumed to be a full docker image name, including the registry url and tag.
# Otherwise, the helm chart will use {{ .Values.global.registry }}/{{ .Values.image.name }}:{{ .Values.global.tag }}
image:
  name: "placement"

nameOverride: ""
fullnameOverride: ""

statefulsetAnnotations: {}

service:
  annotations: {}

ports:
  protocol: TCP
  apiPort: 50005
  raftRPCPort: 8201

scaleZero: false
ha: false

maxActorApiLevel: 10
minActorApiLevel: 0
keepAliveTime: 2s
keepAliveTimeout: 3s
disseminateTimeout: 8s
# Post-round coalesce window. When >0, after a dissemination round
# completes the next round is deferred by this window so additional host
# registers/disconnects arriving inside it collapse into a single
# follow-up round. The first event in REPORT state still fires
# immediately, so cold-starts and isolated churn stay responsive.
# Default 0 disables coalescing and is the right choice for most
# clusters. Set 100ms-250ms only if you observe round thrashing during
# bulk events such as 100+ replica scale-ups or rolling restarts.
disseminateCoalesceWindow: 0s

cluster:
  forceInMemoryLog: false
  logStorePath: /var/run/dapr/raft-log
  logStoreWinPath: C:\\raft-log

volumeclaims:
  storageSize: 1Gi
  storageClassName:

replicationFactor: 100

metadataEnabled: false

livenessProbe:
  initialDelaySeconds: 180
  periodSeconds: 10
  failureThreshold: 5
readinessProbe:
  initialDelaySeconds: 1
  periodSeconds: 1
  failureThreshold: 3

debug:
  enabled: false
  port: 40000
  initialDelaySeconds: 30000

runAsNonRoot: true
fsGroup: 65532

resources: {}

extraEnvVars: {}

