# Default values for dapr_scheduler.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

logLevel: info
component: scheduler

# Override this to use a custom scheduler service image.
# If the image name contains a "/", it is assumed to be a full docker image name, including the registry url and tag.
# Otherwise, the helm chart will use {{ .Values.global.registry }}/{{ .Values.image.name }}:{{ .Values.global.tag }}
image:
  name: "scheduler"

nameOverride: ""
fullnameOverride: ""

statefulsetAnnotations: {}

service:
  annotations: {}

ports:
  protocol: TCP
  etcdGRPCClientPort: 2379
  etcdGRPCPeerPort: 2380

cluster:
  etcdDataDirPath: /var/run/data/dapr-scheduler
  etcdDataDirWinPath: C:\\dapr-scheduler
  storageClassName: ""
  # storageSize is the default size for the scheduler PVC on a fresh install.
  # On an existing install, the StatefulSet template will look up the existing
  # StatefulSet and keep using the storage request from
  # spec.volumeClaimTemplates, because StatefulSet.spec.volumeClaimTemplates is
  # immutable in Kubernetes. Changing this value on an existing cluster would
  # cause helm upgrade to fail. To grow an existing PVC, expand it directly on
  # the cluster.
  storageSize: 16Gi
  inMemoryStorage: false

etcdSpaceQuota: 9.2E
etcdCompactionMode: revision
etcdCompactionRetention: "1000000"
etcdSnapshotCount: 100000
etcdMaxSnapshots: 10
etcdMaxWals: 10
etcdBackendBatchLimit: 10000
etcdBackendBatchInterval: 100ms
etcdMaxTxnOps: 10000
etcdDefragThresholdMB: 100
etcdInitialElectionTickAdvance: false
etcdMetrics: "basic"

etcdEmbed: true
etcdClientEndpoints: []
etcdClientUsername: ""
etcdClientPassword: ""

# Workers is the number of workers that handle job events. The higher the number
# the more go routines will be spawned, each working over a partition of the
# total job space. The higher the number, the higher the number of jobs which
# can be concurrently delivered to runtimes. Increasing this number increases
# the number of go routines for this instance. This number should be tuned to
# the bottleneck of job execution, i.e., CPU, I/O, memory, etc.
workers: 2048

livenessProbe:
  initialDelaySeconds: 180
  periodSeconds: 10
  failureThreshold: 5
readinessProbe:
  initialDelaySeconds: 1
  periodSeconds: 1
  failureThreshold: 3

debug:
  enabled: false
  port: 40000
  initialDelaySeconds: 30000

securityContext:
  runAsNonRoot: true
  fsGroup: 65532

resources: {}

extraEnvVars: {}
