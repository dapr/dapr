name: Automerge

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  automerge:
    if: github.repository_owner == 'dapr'
    uses: dapr/.github/.github/workflows/automerge.yaml@main
    with:
      maintainer-teams: maintainers-dapr
    secrets:
      dapr_bot_token: ${{ secrets.DAPR_BOT_TOKEN }}
