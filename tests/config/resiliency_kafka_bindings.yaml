apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: dapr-resiliency-binding
spec:
  type: bindings.kafka
  initTimeout: 1m
  version: v1
  metadata:
  - name: brokers
    value: dapr-kafka:9092
  - name: topics
    value: resiliency-binding
  - name: consumerGroup
    value: group1
  - name: route
    value: /resiliencybinding
  - name: publishTopic
    value: resiliency-binding
  - name: authRequired
    value: 'false'
  - name: initialOffset
    value: oldest
