apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: test-topic-grpc
spec:
  type: bindings.kafka
  initTimeout: 1m
  version: v1
  metadata:
  - name: brokers
    value: dapr-kafka:9092
  - name: topics
    value: dapr-test-grpc
  - name: consumerGroup
    value: group1
  - name: publishTopic
    value: dapr-test-grpc
  - name: authRequired
    value: 'false'
  - name: initialOffset
    value: oldest
  - name: direction
    value: input, output
