apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: allowlistsgrpcappconfig
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "public"
    policies:
      - appId: "allowlists-caller"
        defaultAction: deny
        trustDomain: 'public'
        namespace: "${DAPR_TEST_NAMESPACE}"
        operations:
          - name: grpcToGrpcTest
            httpVerb: [ '*' ]
            action: allow
          - name: httpToGrpcTest
            httpVerb: [ "*" ]
            action: deny
          - name: grpcToGrpcWithoutVerbTest
            action: allow
      - appId: "grpcproxyclient"
        defaultAction: deny
        trustDomain: 'public'
        namespace: "${DAPR_TEST_NAMESPACE}"
        operations:
          - name: /helloworld.Greeter/SayHello
            action: allow
          - name: /helloworld.Greeter/SayGoodbye
            action: allow
