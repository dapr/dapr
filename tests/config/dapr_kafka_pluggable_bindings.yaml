apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pluggable-test-topic
spec:
  type: bindings.kafka-pluggable
  initTimeout: 1m
  version: v1
  metadata:
  - name: brokers
    value: dapr-kafka:9092
  - name: topics
    value: dapr-test-pluggable
  - name: consumerGroup
    value: group1-pluggable
  - name: publishTopic
    value: dapr-test-pluggable
  - name: authRequired
    value: 'false'
  - name: initialOffset
    value: oldest
