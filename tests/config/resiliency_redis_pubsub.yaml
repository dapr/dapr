apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: dapr-resiliency-pubsub
spec:
  type: pubsub.redis
  initTimeout: 1m
  version: v1
  metadata:
  - name: redisHost
    secretKeyRef:
      name: redissecret
      key: host
  - name: redisPassword
    value: ''
  - name: processingTimeout
    value: '0'
  - name: redeliverInterval
    value: '0'
