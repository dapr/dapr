apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: test-topic-custom-route
spec:
  type: bindings.kafka
  initTimeout: 1m
  version: v1
  metadata:
  - name: brokers
    value: dapr-kafka:9092
  - name: topics
    value: dapr-test
  - name: consumerGroup
    value: group2
  - name: publishTopic
    value: dapr-test
  - name: authRequired
    value: 'false'
  - name: route
    value: /custom-path
  - name: initialOffset
    value: oldest
