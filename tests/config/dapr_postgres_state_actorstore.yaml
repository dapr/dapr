apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore-actors
spec:
  type: state.postgres
  version: v2
  metadata:
  - name: connectionString
    value: host=dapr-postgres-postgresql.dapr-tests.svc.cluster.local user=postgres
      password=example port=5432 connect_timeout=10 database=dapr_test
  - name: tablePrefix
    value: v2actor
  - name: metadataTableName
    value: dapr_metadata_v2actor
  - name: actorStateStore
    value: true
