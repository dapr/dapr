apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: allowlistsappconfig
spec:
  accessControl:
    defaultAction: deny
    trustDomain: "public"
    policies:
    - appId: "allowlists-caller"
      defaultAction: deny
      trustDomain: 'public'
      namespace: "${DAPR_TEST_NAMESPACE}"
      operations:
      - name: /opAllow
        httpVerb: ['POST', 'GET']
        action: allow
      - name: /opDeny
        httpVerb: ["*"]
        action: deny
