    value: "[\n  {\n    \"name\": \"orgIndx\",\n    \"indexes\": [\n      {\n    \
      \    \"key\": \"person.org\",\n        \"type\": \"TEXT\"\n      },\n      {\n\
      \        \"key\": \"state\",\n        \"type\": \"TEXT\"\n      }\n    ]\n \
      \ }\n]\n"
