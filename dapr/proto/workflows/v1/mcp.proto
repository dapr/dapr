syntax = "proto3";

package dapr.proto.workflows.v1;

import "google/protobuf/struct.proto";

option csharp_namespace = "Dapr.Client.Autogen.Grpc.v1";
option java_outer_classname = "DaprWorkflowProtos";
option java_package = "io.dapr.workflows.v1";
option go_package = "github.com/dapr/dapr/pkg/proto/workflows/v1;workflows";

// ---- Middleware hook framing messages ----
//
// MCP-spec wire types (Tool, CallToolResult, ContentBlock, etc) are NOT defined here.
// They live as Go types under pkg/runtime/wfengine/inprocess/mcp/v1/spec/v<DATE>/,
// and are serialized to JSON matching the MCP specification.
//
// Hook input messages carry the MCP-spec JSON as `bytes result` so hook
// workflows in any language can deserialize using their language's
// MCP SDK without depending on Dapr-defined MCP types.

// MCPBeforeCallToolHookInput is received by beforeCallTool middleware hooks.
// When the hook has mutate=true, its return value (same shape) replaces
// the arguments flowing to the tool call.
message MCPBeforeCallToolHookInput {
  // name is the name of the MCPServer resource.
  string name = 1;
  // tool_name is the name of the tool being called.
  string tool_name = 2;
  // arguments is the tool arguments as a JSON object.
  google.protobuf.Struct arguments = 3;
}

// MCPAfterCallToolHookInput is received by afterCallTool middleware hooks.
// When the hook has mutate=true, its return value (CallToolResult shape)
// replaces the result returned to the caller.
// Errors returned by after-hooks fail the workflow.
message MCPAfterCallToolHookInput {
  // name is the name of the MCPServer resource.
  string name = 1;
  // tool_name is the name of the tool that was called.
  string tool_name = 2;
  // arguments is the tool arguments that were sent.
  google.protobuf.Struct arguments = 3;
  // result is the JSON-encoded MCP CallToolResult.
  // Spec: https://modelcontextprotocol.io/specification/2024-11-05/server/tools#tool-result
  bytes result = 4;
}

// MCPBeforeListToolsHookInput is received by beforeListTools middleware hooks.
message MCPBeforeListToolsHookInput {
  // name is the name of the MCPServer resource.
  string name = 1;
}

// MCPAfterListToolsHookInput is received by afterListTools middleware hooks.
// When the hook has mutate=true, its return value (ListToolsResult shape)
// replaces the result returned to the caller.
message MCPAfterListToolsHookInput {
  // name is the name of the MCPServer resource.
  string name = 1;
  // result is the JSON-encoded MCP ListToolsResult.
  // Spec: https://modelcontextprotocol.io/specification/2024-11-05/server/tools#listing-tools
  bytes result = 2;
}
