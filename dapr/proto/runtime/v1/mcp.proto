syntax = "proto3";

package dapr.proto.runtime.v1;

import "google/protobuf/struct.proto";

option csharp_namespace = "Dapr.Client.Autogen.Grpc.v1";
option java_outer_classname = "DaprProtos";
option java_package = "io.dapr.v1";
option go_package = "github.com/dapr/dapr/pkg/proto/runtime/v1;runtime";

// ---- Typed MCP API messages ----

// ListMCPToolsRequest is the request for the ListMCPToolsAlpha1 API.
message ListMCPToolsRequest {
  // mcp_server_name is the name of the MCPServer resource.
  string mcp_server_name = 1;
}

// ListMCPToolsResponse is the response for the ListMCPToolsAlpha1 API.
message ListMCPToolsResponse {
  // tools is the list of tools available on the MCPServer.
  repeated MCPToolDefinition tools = 1;
}

// MCPToolDefinition describes a single tool advertised by an MCP server.
message MCPToolDefinition {
  // name is the tool name.
  string name = 1;
  // description is a human-readable description of the tool.
  string description = 2;
  // input_schema is the JSON Schema for the tool's input arguments, encoded as raw JSON bytes.
  bytes input_schema = 3;
}

// CallMCPToolRequest is the request for the CallMCPToolAlpha1 API.
message CallMCPToolRequest {
  // mcp_server_name is the name of the MCPServer resource.
  string mcp_server_name = 1;
  // tool_name is the name of the MCP tool to invoke.
  string tool_name = 2;
  // arguments is the tool arguments, encoded as a JSON object.
  bytes arguments = 3;
}

// CallMCPToolResponse is the response for the CallMCPToolAlpha1 API.
message CallMCPToolResponse {
  // is_error is true when the tool call failed at the MCP level.
  bool is_error = 1;
  // content holds the content items returned by the tool.
  repeated MCPContentItem content = 2;
}

// MCPContentItem is a single piece of content returned by a tool call.
message MCPContentItem {
  // type is the content type: "text", "image", "audio", "resource_link", or "resource".
  string type = 1;
  // text is set when type is "text".
  string text = 2;
  // data is set when type is "image" or "audio" (base64-encoded).
  string data = 3;
  // mime_type is the MIME type for image, audio, and resource content.
  string mime_type = 4;
  // resource is set when type is "resource_link" or "resource" (raw JSON).
  bytes resource = 5;
}

// ---- Workflow payload messages ----
//
// These define the JSON wire format for MCP workflow inputs/outputs,
// and middleware hook payloads.
// The workflow engine serializes them as JSON (not protobuf binary).
// SDKs should construct/parse these as JSON objects using the field names defined here.

// MCPCallToolWorkflowInput is the input for a
// dapr.internal.mcp.<server>.CallTool workflow.
message MCPCallToolWorkflowInput {
  // tool_name is the name of the MCP tool to invoke.
  string tool_name = 1;
  // arguments is the tool arguments as a JSON object.
  google.protobuf.Struct arguments = 2;
}

// ---- Middleware hook payload messages ----

// MCPBeforeCallToolHookInput is received by beforeCallTool middleware hooks.
// When the hook has mutate=true, its return value (same shape) replaces
// the arguments flowing to the tool call.
message MCPBeforeCallToolHookInput {
  // mcp_server_name is the name of the MCPServer resource.
  string mcp_server_name = 1;
  // tool_name is the name of the tool being called.
  string tool_name = 2;
  // arguments is the tool arguments as a JSON object.
  google.protobuf.Struct arguments = 3;
}

// MCPAfterCallToolHookInput is received by afterCallTool middleware hooks.
// When the hook has mutate=true, its return value (CallMCPToolResponse shape)
// replaces the result returned to the caller.
message MCPAfterCallToolHookInput {
  // mcp_server_name is the name of the MCPServer resource.
  string mcp_server_name = 1;
  // tool_name is the name of the tool that was called.
  string tool_name = 2;
  // arguments is the tool arguments that were sent.
  google.protobuf.Struct arguments = 3;
  // result is the tool call result.
  CallMCPToolResponse result = 4;
}

// MCPBeforeListToolsHookInput is received by beforeListTools middleware hooks.
message MCPBeforeListToolsHookInput {
  // mcp_server_name is the name of the MCPServer resource.
  string mcp_server_name = 1;
}

// MCPAfterListToolsHookInput is received by afterListTools middleware hooks.
// When the hook has mutate=true, its return value (ListMCPToolsResponse shape)
// replaces the result returned to the caller.
message MCPAfterListToolsHookInput {
  // mcp_server_name is the name of the MCPServer resource.
  string mcp_server_name = 1;
  // result is the list tools result.
  ListMCPToolsResponse result = 2;
}
